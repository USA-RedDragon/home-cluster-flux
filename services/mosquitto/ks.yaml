apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mosquitto
  namespace: mosquitto
spec:
  interval: 1h
  targetNamespace: mosquitto
  path: ./services/mosquitto/app
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: restic
  namespace: mosquitto
spec:
  interval: 1h
  targetNamespace: mosquitto
  path: ./services/mosquitto/restic
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system
