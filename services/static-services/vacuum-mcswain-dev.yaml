apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: vacuum
  namespace: static-services
  labels:
    kubernetes.io/service-name: vacuum
    endpointslice.kubernetes.io/managed-by: cluster-admins
addressType: IPv4
endpoints:
  - addresses:
    - 192.168.1.225
    conditions:
      ready: true
ports:
  - name: http
    port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: vacuum
  namespace: static-services
spec:
  internalTrafficPolicy: Cluster
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vacuum
  namespace: static-services
spec:
  ingressClassName: tailscale
  rules:
  - host: vacuum
    http:
      paths:
      - backend:
          service:
            name: vacuum
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - vacuum
