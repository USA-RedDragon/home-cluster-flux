apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: modem
  namespace: static-services
  labels:
    kubernetes.io/service-name: modem
    endpointslice.kubernetes.io/managed-by: cluster-admins
addressType: IPv4
endpoints:
  - addresses:
    - 192.168.100.1
    conditions:
      ready: true
ports:
  - name: https
    port: 443
---
apiVersion: v1
kind: Service
metadata:
  name: modem
  namespace: static-services
spec:
  internalTrafficPolicy: Cluster
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: 443
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modem
  namespace: static-services
spec:
  ingressClassName: tailscale
  rules:
  - host: modem
    http:
      paths:
      - backend:
          service:
            name: modem
            port:
              number: 443
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - modem