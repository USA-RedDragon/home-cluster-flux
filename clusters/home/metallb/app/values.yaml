loadBalancerClass: "metallb"

prometheus:
  podMonitor:
    enabled: true

  prometheusRule:
    enabled: true

  rbacPrometheus: false

controller:
  image:
    repository: quay.io/metallb/controller
    tag: v0.15.3
  resources: {}

speaker:
  image:
    repository: quay.io/metallb/speaker
    tag: v0.15.3
  resources: {}
  updateStrategy:
    type: OnDelete
  frr:
    enabled: false
    image:
      repository: quay.io/frrouting/frr
      tag: 10.5.3@sha256:37b42d2b340c322edc5f20dc4598373adb6e813e95cc9d4a18f64f9a37c98a4c
    metricsPort: 7473
    resources: {}

  reloader:
    resources: {}

  frrMetrics:
    resources: {}

  extraContainers: []

crds:
  enabled: true
  validationFailurePolicy: Fail
