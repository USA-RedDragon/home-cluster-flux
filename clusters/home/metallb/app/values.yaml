loadBalancerClass: "metallb"

prometheus:
  podMonitor:
    enabled: true

  prometheusRule:
    enabled: true

  rbacPrometheus: false

controller:
  image:
    repository: quay.io/metallb/controller
    tag: v0.15.3
  resources: {}

speaker:
  image:
    repository: quay.io/metallb/speaker
    tag: v0.15.3
  resources: {}
  updateStrategy:
    type: OnDelete
  frr:
    enabled: false
    image:
      repository: quay.io/frrouting/frr
      tag: 10.5.2@sha256:94e78424a15839e0953623e2515c3e54f308644946395bc341b25e43f5c2d323
    metricsPort: 7473
    resources: {}

  reloader:
    resources: {}

  frrMetrics:
    resources: {}

  extraContainers: []

crds:
  enabled: true
  validationFailurePolicy: Fail
