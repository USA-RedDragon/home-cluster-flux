apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: minecraft
resources:
  - ns.yaml
  - cobblemon-helm.yaml
  - cobblemon-networkpolicy.yaml
  - dragonmc-site-helm.yaml
configMapGenerator:
  - name: dragonmc-site-chart-values
    files:
      - values.yaml=dragonmc-site-values.yaml
  - name: cobblemon-chart-values
    files:
      - values.yaml=cobblemon-values.yaml
configurations:
  - kustomizeconfig.yaml
