# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json

controllers:
  cyberchef:
    replicas: 1
    containers:
      cyberchef:
        image:
          repository: jacob.pub/ghcr.io/gchq/cyberchef
          tag: 11.3.0@sha256:59849a25292c9d6fb6a85a3efc1706653d9b7f168f8901ef684fa2414b968be8
          pullPolicy: IfNotPresent
        resources:
          limits:
            memory: 100Mi
          requests:
            cpu: 10m
            memory: 30Mi
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true

service:
  cyberchef:
    controller: cyberchef
    ports:
      http:
        port: 8080

route:
  cyberchef:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: public
        namespace: envoy-gateway-system
        sectionName: https
    hostnames:
      - cyberchef.mcswain.dev
    rules:
      - backendRefs:
          - name: cyberchef
            port: 8080
        matches:
          - path:
              type: PathPrefix
              value: /
