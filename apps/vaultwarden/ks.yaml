apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 1h
  targetNamespace: vaultwarden
  path: ./apps/vaultwarden/app
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: restic
  namespace: vaultwarden
spec:
  interval: 1h
  targetNamespace: vaultwarden
  path: ./apps/vaultwarden/restic
  prune: true
  sourceRef:
    kind: GitRepository
    namespace: flux-system
    name: flux-system
