apiVersion: v1
kind: PersistentVolume
metadata:
  name: tdarr-media
  namespace: tdarr
spec:
  capacity:
    storage: 1Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: tdarr-media
  mountOptions:
    - hard
    - nfsvers=4.2
    - rsize=1048576
    - wsize=1048576
    - nconnect=8
    - lookupcache=positive
  nfs:
    path: /mnt/data/media
    server: 192.168.1.135
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-media
  namespace: tdarr
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti
  storageClassName: tdarr-media
  volumeMode: Filesystem
  volumeName: tdarr-media
