---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nats
  namespace: rtz
spec:
  interval: 1m0s
  url: https://nats-io.github.io/k8s/helm/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nats
  namespace: rtz
spec:
  install:
    remediation:
      retries: -1
  interval: 1m0s
  driftDetection:
    mode: enabled
  releaseName: nats
  chart:
    spec:
      chart: nats
      sourceRef:
        kind: HelmRepository
        name: nats
      version: '1.3.16'
      interval: 1m0s
  values:
    container:
      image:
        repository: jacob.pub/docker.io/nats
        tag: 2.14.0-alpine@sha256:df3dbf7615519c64c1ecf5bff1811e0f1349e980e12cf8edac882a53cf3f9dd9
      env:
        TOKEN:
          valueFrom:
            secretKeyRef:
              name: rtz
              key: nats-token
    reloader:
      enabled: false
    promExporter:
      enabled: true
      image:
        repository: jacob.pub/docker.io/natsio/prometheus-nats-exporter
        tag: 0.20.0@sha256:c7b8ccd329563cac8c5dcbfacfe5ee3603c879920ac1058fa0fc777a2427f8f7
      podMonitor:
        enabled: true
    natsBox:
      enabled: false
    config:
      monitor:
        enabled: true
      cluster:
        enabled: true
      merge:
        authorization:
          token: << $TOKEN >>
        max_payload: << 32MB >>
