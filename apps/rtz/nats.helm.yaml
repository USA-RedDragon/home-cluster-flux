---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nats
  namespace: rtz
spec:
  interval: 1m0s
  url: https://nats-io.github.io/k8s/helm/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nats
  namespace: rtz
spec:
  install:
    remediation:
      retries: -1
  interval: 1m0s
  driftDetection:
    mode: enabled
  releaseName: nats
  chart:
    spec:
      chart: nats
      sourceRef:
        kind: HelmRepository
        name: nats
      version: '2.14.2'
      interval: 1m0s
  values:
    container:
      image:
        repository: jacob.pub/docker.io/nats
        tag: 2.14.2-alpine@sha256:b039b46715673a9436989cfc49dde04e6bd57e205347478a58214789baf5efdc
      env:
        TOKEN:
          valueFrom:
            secretKeyRef:
              name: rtz
              key: nats-token
    reloader:
      enabled: false
    promExporter:
      enabled: true
      image:
        repository: jacob.pub/docker.io/natsio/prometheus-nats-exporter
        tag: 0.20.1@sha256:4fbf6dacb84780a45a1c3af9b1080c69451a288d20902deae671b80717bb8f61
      podMonitor:
        enabled: true
    natsBox:
      enabled: false
    config:
      monitor:
        enabled: true
      cluster:
        enabled: true
      merge:
        authorization:
          token: << $TOKEN >>
        max_payload: << 32MB >>
