          repository: jacob.pub/ghcr.io/mariadb/mariadb
          tag: 12.2.2-noble@sha256:71954573ee2d5d0a3658cf8d0bc4f34e87b90ffcd109752344ec6f29a49583ef
        env:
          MARIADB_DATABASE: weewx
