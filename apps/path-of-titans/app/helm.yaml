apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: path-of-titans
  namespace: path-of-titans
spec:
  install:
    remediation:
      retries: -1
  interval: 60m0s
  driftDetection:
    mode: enabled
  releaseName: path-of-titans
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: '5.0.1'
      interval: 60m0s
  valuesFrom:
    - kind: ConfigMap
      name: chart-values
