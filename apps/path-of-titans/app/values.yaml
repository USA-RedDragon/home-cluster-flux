# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
controllers:
  path-of-titans:
    replicas: 1
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    initContainers:
      # BattlEye rewrites BEServer_x64.cfg on every boot, but its directory is on
      # the read-only rootfs. Seed an emptyDir with the shipped BattlEye files so
      # the directory can be mounted writable over the image's copy.
      battleye-seed:
        image:
          repository: jacob.pub/ghcr.io/usa-reddragon/path-of-titans
          tag: 48554h25@sha256:93cf8ee35c247c753496ba854cb95b2f51c052569c074c8ad102eaa1cf06694e
          pullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - cp -r /opt/path-of-titans/PathOfTitans/Binaries/Linux/BattlEye/* /battleye/
        securityContext: &security-context
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
    containers:
      path-of-titans:
        image:
          repository: jacob.pub/ghcr.io/usa-reddragon/path-of-titans
          tag: 48554h25@sha256:93cf8ee35c247c753496ba854cb95b2f51c052569c074c8ad102eaa1cf06694e
          pullPolicy: IfNotPresent
        resources:
          limits: {}
          requests:
            cpu: 1000m
            memory: 5500Mi
        securityContext: *security-context
        probes:
          liveness:
            enabled: true
            custom: true
            spec: &probe
              exec:
                command:
                  - /bin/sh
                  - -c
                  # /proc/net/udp lists ports in hex, so render 7777 as 1E61
                  - 'grep -qE ":$(printf %04X 7777)[[:space:]]" /proc/net/udp'
              periodSeconds: 10
              failureThreshold: 10
          readiness:
            enabled: true
            custom: true
            spec: *probe
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/sh
                  - -c
                  # /proc/net/udp lists ports in hex, so render 7777 as 1E61
                  - 'grep -qE ":$(printf %04X 7777)[[:space:]]" /proc/net/udp'
              periodSeconds: 10
              failureThreshold: 30
        env:
        - name: TZ
          value: America/Chicago
        - name: SERVER_GUID
          valueFrom:
            secretKeyRef:
              name: path-of-titans
              key: server-guid
        - name: SERVER_NAME
          value: "JACOB TEST SERVER"
        - name: RCON_IP
          value: "0.0.0.0"
        - name: RCON_PASSWORD
          valueFrom:
            secretKeyRef:
              name: path-of-titans
              key: rcon-password
        - name: AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: path-of-titans
              key: auth-token

service:
  path-of-titans:
    controller: path-of-titans
    ports:
      game:
        port: 7777
        protocol: UDP
        primary: true
  rcon:
    controller: path-of-titans
    annotations:
      tailscale.com/expose: "true"
      tailscale.com/hostname: "path-of-titans-rcon"
    ports:
      rcon:
        port: 7779
        protocol: UDP

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 8Gi
    storageClass: longhorn-nvme
    globalMounts:
      - path: /opt/path-of-titans/PathOfTitans/Saved
  battleye:
    enabled: true
    type: emptyDir
    sizeLimit: 256Mi
    advancedMounts:
      path-of-titans:
        battleye-seed:
          - path: /battleye
        path-of-titans:
          - path: /opt/path-of-titans/PathOfTitans/Binaries/Linux/BattlEye

route:
  game:
    enabled: true
    kind: UDPRoute
    parentRefs:
      - name: public
        namespace: envoy-gateway-system
        sectionName: path-of-titans
    rules:
      - backendRefs:
          - name: path-of-titans
            port: 7777
