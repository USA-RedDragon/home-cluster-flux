# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
controllers:
  path-of-titans:
    replicas: 1
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    initContainers:
      # BattlEye rewrites BEServer_x64.cfg on every boot, but its directory is on
      # the read-only rootfs. Seed an emptyDir with the shipped BattlEye files so
      # the directory can be mounted writable over the image's copy.
      battleye-seed:
        image:
          repository: jacob.pub/ghcr.io/usa-reddragon/path-of-titans
          tag: 48554h25@sha256:1727310a43fe08c5bc3143ffb1361d0c654485f89b9d32ebfa46145d46bbcfd7
          pullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - cp -r /opt/path-of-titans/PathOfTitans/Binaries/Linux/BattlEye/* /battleye/
        securityContext: &security-context
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
    containers:
      path-of-titans:
        image:
          repository: jacob.pub/ghcr.io/usa-reddragon/path-of-titans
          tag: 48554h25@sha256:1727310a43fe08c5bc3143ffb1361d0c654485f89b9d32ebfa46145d46bbcfd7
          pullPolicy: IfNotPresent
        resources:
          limits: {}
          requests:
            memory: 300Mi
        securityContext: *security-context
        probes:
          liveness:
            enabled: true
            spec:
              failureThreshold: 10
          readiness:
            enabled: true
            spec:
              failureThreshold: 10
          startup:
            enabled: true
            spec:
              failureThreshold: 10
        env:
        - name: TZ
          value: America/Chicago
        - name: SERVER_GUID
          valueFrom:
            secretKeyRef:
              name: path-of-titans
              key: server-guid
        - name: SERVER_NAME
          value: "JACOB TEST SERVER"
        - name: RCON_IP
          value: "0.0.0.0"
        - name: RCON_PASSWORD
          valueFrom:
            secretKeyRef:
              name: path-of-titans
              key: rcon-password
        - name: AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: path-of-titans
              key: auth-token

service:
  path-of-titans:
    controller: path-of-titans
    ports:
      game:
        port: 7777
        protocol: UDP
      rcon:
        port: 7779
        primary: true

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 8Gi
    storageClass: longhorn-nvme
    globalMounts:
      - path: /opt/path-of-titans/PathOfTitans/Saved
  battleye:
    enabled: true
    type: emptyDir
    sizeLimit: 256Mi
    advancedMounts:
      path-of-titans:
        battleye-seed:
          - path: /battleye
        path-of-titans:
          - path: /opt/path-of-titans/PathOfTitans/Binaries/Linux/BattlEye

route:
  game:
    enabled: true
    kind: UDPRoute
    parentRefs:
      - name: public
        namespace: envoy-gateway-system
        sectionName: path-of-titans
    rules:
      - backendRefs:
          - name: path-of-titans
            port: 7777
  rcon:
    enabled: true
    kind: TCPRoute
    parentRefs:
      - name: public
        namespace: envoy-gateway-system
        sectionName: path-of-titans-rcon
    rules:
      - backendRefs:
          - name: path-of-titans
            port: 7779
