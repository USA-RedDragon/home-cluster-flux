apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: forward-auth
  namespace: frigate
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: frigate
  oidc:
    provider:
      issuer: https://authentik.mcswain.dev/application/o/frigate/
    clientIDRef:
      name: frigate-oidc
    clientSecret:
      name: frigate-oidc
    scopes: [frigate, openid, profile, offline_access]
    forwardAccessToken: true
    refreshToken: true
  jwt:
    providers:
      - name: authentik
        issuer: https://authentik.mcswain.dev/application/o/frigate/
        remoteJWKS:
          uri: https://authentik.mcswain.dev/application/o/frigate/jwks/
        claimToHeaders:
          - header: X-authentik-username
            claim: preferred_username
          - header: X-authentik-groups
            claim: frigate-role
          - header: X-Proxy-Secret
            claim: ak_proxy.frigate_proxy_secret
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: strip-oidc-cookies
  namespace: frigate
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: frigate
  lua:
    - type: Inline
      inline: |
        function envoy_on_request(handle)
          -- Only strip Authorization if it's the Bearer JWT Envoy injected.
          -- Subsonic clients use Basic auth and must pass through.
          local auth = handle:headers():get("authorization")
          if auth ~= nil and auth:sub(1, 7):lower() == "bearer " then
            handle:headers():remove("authorization")
          end

          local cookie = handle:headers():get("cookie")
          if cookie == nil then return end
          local kept = {}
          for pair in string.gmatch(cookie, "([^;]+)") do
            local trimmed = pair:match("^%s*(.-)%s*$")
            local name = trimmed:match("^([^=]+)=")
            if name and not (
                 name == "AccessToken"
              or name == "IdToken"
              or name == "RefreshToken"
              or name:match("^Oauth")
              or name == "BearerToken"
              or name == "Nonce"
              or name == "CodeVerifier") then
              table.insert(kept, trimmed)
            end
          end
          handle:headers():remove("cookie")
          if #kept > 0 then
            handle:headers():add("cookie", table.concat(kept, "; "))
          end
        end
