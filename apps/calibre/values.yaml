# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json

controllers:
  calibre:
    replicas: 1
    pod:
      securityContext:
        fsGroup: 911
    containers:
      calibre:
        image:
          repository: lscr.io/linuxserver/calibre
          tag: 8.1.1@sha256:592dab1eb7323d09426f85faac77d92293e633d0ee71c98b5decbff483a311b2
          pullPolicy: IfNotPresent
        resources:
          requests:
            cpu: '1'
            memory: 2Gi
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
        env:
          - name: TZ
            value: America/Chicago

service:
  calibre:
    controller: calibre
    ports:
      content:
        port: 8081
      vnc:
        port: 8080
        primary: true

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
  media-books:
    enabled: true
    type: nfs
    path: /mnt/data/media/Books
    server: 192.168.1.135

ingress:
  tailscale-vnc:
    enabled: true
    className: tailscale
    hosts:
      - host: calibre-vnc
        paths:
        - path: /
          pathType: Prefix
          service:
              identifier: calibre
              port: vnc
    tls:
      - hosts:
          - calibre-vnc
  tailscale:
    enabled: true
    className: tailscale
    hosts:
      - host: calibre
        paths:
        - path: /
          pathType: Prefix
          service:
              identifier: calibre
              port: content
    tls:
      - hosts:
          - calibre
