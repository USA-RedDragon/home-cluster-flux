# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.4.0/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json

controllers:
  iperf3:
    replicas: 1
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65535
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
    containers:
      iperf3:
        image:
          repository: jacob.pub/ghcr.io/usa-reddragon/iperf3
          tag: 3.19.1@sha256:9a1b405ca100e8629f053f5e8b676f5df9289e2a48f47ef68639d30a456412b5
          pullPolicy: IfNotPresent
        args:
          - -s
          - --idle-timeout
          - "3"
        resources:
          requests: {}
          limits: {}
        securityContext:
          fsGroup: 65534
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

service:
  iperf3:
    controller: iperf3
    annotations:
      tailscale.com/expose: "true"
      tailscale.com/hostname: "iperf3"
    ports:
      iperf:
        port: 5201

route:
  iperf3:
    enabled: true
    kind: TCPRoute
    parentRefs:
      - name: public
        namespace: envoy-gateway-system
        sectionName: iperf3
    rules:
      - backendRefs:
          - name: iperf3
            port: 5201

persistence:
  tmp:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 1Gi
