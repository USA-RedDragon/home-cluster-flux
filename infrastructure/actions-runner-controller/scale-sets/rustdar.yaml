---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustdar-runner-set
  namespace: actions-runners
spec:
  interval: 1m0s
  driftDetection:
    mode: enabled
  releaseName: rustdar-runner-set
  chart:
    spec:
      chart: gha-runner-scale-set
      sourceRef:
        kind: HelmRepository
        namespace: actions-runner-system
        name: actions-runner-controller
      version: 0.14.0
      interval: 1m0s
  install:
    remediation:
      retries: -1
  values:
    githubConfigSecret: github-app
    githubConfigUrl: "https://github.com/USA-RedDragon/rustdar"
