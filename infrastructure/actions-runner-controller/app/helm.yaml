---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: actions-runner-controller
  namespace: actions-runner-system
spec:
  interval: 1m0s
  url: https://actions-runner-controller.github.io/actions-runner-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-runner-controller
  namespace: actions-runner-system
spec:
  interval: 1m0s
  driftDetection:
    mode: enabled
  releaseName: actions-runner-controller
  chart:
    spec:
      chart: actions-runner-controller
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
      version: 0.23.7
      interval: 1m0s
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: chart-values
