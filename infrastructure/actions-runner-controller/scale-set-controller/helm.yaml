---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set-controller
  namespace: actions-runner-system
spec:
  interval: 1m0s
  driftDetection:
    mode: enabled
  releaseName: arc
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      sourceRef:
        kind: HelmRepository
        namespace: actions-runner-system
        name: actions-runner-controller
      version: 0.14.1
      interval: 1m0s
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: chart-values
