# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backup-sync-mcswain-backup
  namespace: backup-sync
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      backup-sync:
        type: cronjob
        cronjob:
          schedule: 0 6 * * *
          concurrencyPolicy: Replace
          ttlSecondsAfterFinished: 3600
        containers:
          backup-sync:
            image:
              repository: jacob.pub/docker.io/rclone/rclone
              tag: 1.74.0@sha256:d2e0e88359d0b2e67cfcd2c43d5405185eb8adfc207079df27c42da82c5207bc
            env:
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: s3-backup-credentials
                    key: accesskey
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: s3-backup-credentials
                    key: secretkey
              - name: RCLONE_CONFIG_B2_ACCOUNT
                valueFrom:
                  secretKeyRef:
                    name: b2-backup-credentials
                    key: account
              - name: RCLONE_CONFIG_B2_KEY
                valueFrom:
                  secretKeyRef:
                    name: b2-backup-credentials
                    key: key
            args:
              - --config
              - /rclone.conf
              - --log-level=NOTICE
              - --stats-log-level=NOTICE
              - --stats=30s
              - --stats-one-line-date
              - --s3-storage-class
              - DEEP_ARCHIVE
              - sync
              - b2:mcswain-backup
              - s3:mcswain-backups/mcswain-backup
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi

    configMaps:
      config:
        data:
          rclone.conf: |
            [b2]
            type = b2
            hard_delete = true
            [s3]
            type = s3
            provider = AWS
            env_auth = true
            no_check_bucket = true

    persistence:
      config:
        enabled: true
        type: configMap
        name: backup-sync-mcswain-backup
        advancedMounts:
          backup-sync:
            backup-sync:
              - path: /rclone.conf
                subPath: rclone.conf
